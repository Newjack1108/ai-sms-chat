<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Orders - Production System</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo">
            <img src="logo.png" alt="Company Logo" onerror="this.style.display='none';">
            <h1>Purchase Orders</h1>
        </div>
        <div class="navbar-right">
            <span class="navbar-user" id="userInfo"></span>
            <a href="dashboard.html" class="btn btn-secondary btn-sm">Dashboard</a>
            <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2>Purchase Orders</h2>
                <button class="btn btn-primary admin-or-office" onclick="showCreatePoModal()">Create Purchase Order</button>
            </div>
            <div id="ordersList"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <div id="poModal" class="modal">
        <div class="modal-content" style="max-width: 980px;">
            <div class="modal-header">
                <h3>Create Purchase Order</h3>
                <button class="modal-close" onclick="hideModal('poModal')">&times;</button>
            </div>
            <form id="poForm">
                <div class="grid grid-2">
                    <div class="form-group"><label class="form-label">PO Number</label><input id="poNumberPreview" class="form-input" readonly></div>
                    <div class="form-group"><label class="form-label">Order Date</label><input id="poOrderDate" type="date" class="form-input" required></div>
                    <div class="form-group"><label class="form-label">Expected Date</label><input id="poExpectedDate" type="date" class="form-input"></div>
                    <div class="form-group"><label class="form-label">Supplier *</label><select id="poSupplier" class="form-select" required></select></div>
                </div>
                <div class="form-group">
                    <label class="form-label" style="display: flex; align-items: center; gap: 8px;">
                        <input id="poOneOffPurchase" type="checkbox" style="width: auto;">
                        <span>One-off purchase (allow no line items)</span>
                    </label>
                </div>
                <div class="form-group"><label class="form-label">Notes</label><textarea id="poNotes" class="form-textarea"></textarea></div>
                <h4>Line Items</h4>
                <table class="table">
                    <thead><tr><th>Type</th><th>Item</th><th>Unit</th><th>Qty</th><th>Unit Cost</th><th>Total</th><th></th></tr></thead>
                    <tbody id="lineItemsBody"></tbody>
                </table>
                <div style="margin-bottom: 12px;">
                    <button type="button" class="btn btn-secondary btn-sm" onclick="addLineItem('raw_material')">Add Raw Material</button>
                    <button type="button" class="btn btn-secondary btn-sm" id="addCustomLineBtn" onclick="addLineItem('custom')" style="display: none;">Add Custom Line</button>
                </div>
                <div style="font-weight: 600; margin-bottom: 12px;">Subtotal: <span id="subtotalLabel">£0.00</span></div>
                <div class="text-right">
                    <button type="button" class="btn btn-secondary" onclick="hideModal('poModal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create PO</button>
                </div>
            </form>
        </div>
    </div>

    <div id="receiveModal" class="modal">
        <div class="modal-content" style="max-width: 980px;">
            <div class="modal-header">
                <h3 id="receiveModalTitle">Receive Purchase Order</h3>
                <button class="modal-close" onclick="hideModal('receiveModal')">&times;</button>
            </div>
            <div id="receiveModalContent"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content" style="max-width: 980px;">
            <div class="modal-header">
                <h3 id="viewModalTitle">Purchase Order Details</h3>
                <button class="modal-close" onclick="hideModal('viewModal')">&times;</button>
            </div>
            <div id="viewModalContent"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <script src="common.js"></script>
    <script>
        let suppliers = [];
        let stockItems = [];
        let lineItems = [];
        let currentReceiveOrder = null;

        async function init() {
            if (await restrictStaffAccess()) return;
            const user = await checkAuth();
            if (!user) return;
            await initNavbar();
            await Promise.all([loadSuppliers(), loadStockItems(), loadOrders()]);
        }

        async function loadSuppliers() {
            const data = await apiCall('/suppliers');
            suppliers = (data.suppliers || []).filter((s) => s.is_active);
            const select = document.getElementById('poSupplier');
            select.innerHTML = '<option value="">Select supplier</option>' + suppliers.map((s) => `<option value="${s.id}">${escapeHtml(s.name)}${s.code ? ` (${escapeHtml(s.code)})` : ''}</option>`).join('');
        }

        async function loadStockItems() {
            const data = await apiCall('/stock?all=1');
            stockItems = data.items || [];
        }

        function isOneOffPurchaseSelected() {
            const checkbox = document.getElementById('poOneOffPurchase');
            return !!(checkbox && checkbox.checked);
        }

        function escapeAttr(text) {
            return escapeHtml(text).replace(/"/g, '&quot;');
        }

        function renderLineItems() {
            const tbody = document.getElementById('lineItemsBody');
            const allowCustom = isOneOffPurchaseSelected();
            const addCustomBtn = document.getElementById('addCustomLineBtn');
            if (addCustomBtn) {
                addCustomBtn.style.display = allowCustom ? '' : 'none';
            }
            tbody.innerHTML = lineItems.map((item, i) => {
                const lineType = item.line_type || (item.custom_item_name ? 'custom' : 'raw_material');
                const total = (parseFloat(item.quantity || 0) * parseFloat(item.unit_cost_gbp || 0)) || 0;
                const selectedStock = stockItems.find((s) => String(s.id) === String(item.stock_item_id));
                return `
                    <tr>
                        <td>
                            <select class="form-select" onchange="updateLineItem(${i}, 'line_type', this.value)">
                                <option value="raw_material" ${lineType === 'raw_material' ? 'selected' : ''}>Raw Material</option>
                                ${allowCustom ? `<option value="custom" ${lineType === 'custom' ? 'selected' : ''}>Custom</option>` : ''}
                            </select>
                        </td>
                        <td>
                            ${lineType === 'custom'
                                ? `<input type="text" class="form-input" value="${escapeAttr(item.custom_item_name || '')}" placeholder="Custom item name" onchange="updateLineItem(${i}, 'custom_item_name', this.value)">`
                                : `<select class="form-select" onchange="updateLineItem(${i}, 'stock_item_id', this.value)">
                                    <option value="">Select raw material</option>
                                    ${stockItems.map((s) => `<option value="${s.id}" ${String(item.stock_item_id) === String(s.id) ? 'selected' : ''}>${escapeHtml(s.name)} (${escapeHtml(s.unit || 'unit')})</option>`).join('')}
                                </select>`
                            }
                        </td>
                        <td>
                            ${lineType === 'custom'
                                ? `<input type="text" class="form-input" value="${escapeAttr(item.custom_unit || 'item')}" placeholder="Unit" onchange="updateLineItem(${i}, 'custom_unit', this.value)">`
                                : `<span>${escapeHtml(selectedStock?.unit || '-')}</span>`
                            }
                        </td>
                        <td><input type="number" min="0.01" step="0.01" class="form-input" value="${item.quantity || ''}" onchange="updateLineItem(${i}, 'quantity', this.value)"></td>
                        <td><input type="number" min="0" step="0.01" class="form-input" value="${item.unit_cost_gbp || ''}" onchange="updateLineItem(${i}, 'unit_cost_gbp', this.value)"></td>
                        <td>${formatCurrency(total)}</td>
                        <td><button type="button" class="btn btn-danger btn-sm" onclick="removeLineItem(${i})">Remove</button></td>
                    </tr>
                `;
            }).join('');
            const subtotal = lineItems.reduce((sum, item) => sum + ((parseFloat(item.quantity || 0) * parseFloat(item.unit_cost_gbp || 0)) || 0), 0);
            document.getElementById('subtotalLabel').textContent = formatCurrency(subtotal);
        }

        function addLineItem(type = 'raw_material') {
            lineItems.push({
                line_type: type,
                stock_item_id: '',
                custom_item_name: '',
                custom_unit: type === 'custom' ? 'item' : '',
                quantity: '',
                unit_cost_gbp: ''
            });
            renderLineItems();
        }

        function removeLineItem(index) {
            lineItems.splice(index, 1);
            renderLineItems();
        }

        function updateLineItem(index, key, value) {
            if (key === 'line_type') {
                const current = lineItems[index] || {};
                lineItems[index] = {
                    line_type: value,
                    stock_item_id: '',
                    custom_item_name: '',
                    custom_unit: value === 'custom' ? (current.custom_unit || 'item') : '',
                    quantity: current.quantity || '',
                    unit_cost_gbp: current.unit_cost_gbp || ''
                };
                renderLineItems();
                return;
            }
            lineItems[index][key] = value;
            renderLineItems();
        }

        async function showCreatePoModal() {
            document.getElementById('poForm').reset();
            document.getElementById('poOrderDate').value = londonYmd(new Date());
            lineItems = [];
            addLineItem('raw_material');
            const numberData = await apiCall(`/purchase-orders/next-number?order_date=${encodeURIComponent(document.getElementById('poOrderDate').value)}`);
            document.getElementById('poNumberPreview').value = numberData.po_number || '';
            renderLineItems();
            showModal('poModal');
        }

        async function loadOrders() {
            try {
                const data = await apiCall('/purchase-orders?page=1&page_size=100');
                const rows = data.orders || [];
                const container = document.getElementById('ordersList');
                if (!rows.length) {
                    container.innerHTML = '<p>No purchase orders yet</p>';
                    return;
                }
                container.innerHTML = `
                    <table class="table">
                        <thead><tr><th>PO Number</th><th>Supplier</th><th>Type</th><th>Status</th><th>Order Date</th><th>Expected</th><th>Subtotal</th><th>Actions</th></tr></thead>
                        <tbody>
                            ${rows.map((o) => `
                                <tr>
                                    <td><strong>${escapeHtml(o.po_number)}</strong></td>
                                    <td>${escapeHtml(o.supplier_name || '-')}</td>
                                    <td>${o.is_one_off_purchase ? '<span class="badge badge-warning">One-off</span>' : '<span class="badge badge-secondary">Standard</span>'}</td>
                                    <td><span class="badge badge-info">${escapeHtml(o.status || '')}</span></td>
                                    <td>${formatDate(o.order_date)}</td>
                                    <td>${formatDate(o.expected_date)}</td>
                                    <td>${formatCurrency(o.subtotal_gbp || 0)}</td>
                                    <td>
                                        <button class="btn btn-secondary btn-sm" onclick="viewPo(${o.id})">View</button>
                                        <button class="btn btn-success btn-sm admin-or-office" onclick="receivePo(${o.id})">Receive</button>
                                        <button class="btn btn-danger btn-sm admin-or-office" onclick="deletePo(${o.id}, '${escapeHtml(o.po_number)}')">Delete</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                document.getElementById('ordersList').innerHTML = '<p>Error loading purchase orders</p>';
            }
        }

        async function viewPo(id) {
            try {
                const data = await apiCall(`/purchase-orders/${id}`);
                const o = data.order;
                document.getElementById('viewModalTitle').textContent = `Purchase Order ${o.po_number}`;
                document.getElementById('viewModalContent').innerHTML = `
                    <div class="grid grid-2" style="margin-bottom: 16px;">
                        <div><strong>Supplier:</strong> ${escapeHtml(o.supplier_name || '-')}</div>
                        <div><strong>Status:</strong> <span class="badge badge-info">${escapeHtml(o.status || '')}</span></div>
                        <div><strong>Order Date:</strong> ${formatDate(o.order_date)}</div>
                        <div><strong>Expected Date:</strong> ${formatDate(o.expected_date)}</div>
                        <div><strong>Type:</strong> ${o.is_one_off_purchase ? '<span class="badge badge-warning">One-off</span>' : '<span class="badge badge-secondary">Standard</span>'}</div>
                        <div><strong>Subtotal:</strong> ${formatCurrency(o.subtotal_gbp || 0)}</div>
                    </div>
                    <div style="margin-bottom: 16px;">
                        <strong>Notes:</strong><br>
                        <div style="margin-top: 6px; white-space: pre-wrap;">${escapeHtml(o.notes || '-')}</div>
                    </div>
                    <table class="table">
                        <thead><tr><th>Type</th><th>Item</th><th>Unit</th><th>Qty</th><th>Unit Cost</th><th>Total</th></tr></thead>
                        <tbody>
                            ${(o.items || []).length === 0 ? '<tr><td colspan="6">No line items</td></tr>' : (o.items || []).map((it) => `
                                <tr>
                                    <td>${it.is_custom_item ? '<span class="badge badge-warning">Custom</span>' : '<span class="badge badge-secondary">Raw Material</span>'}</td>
                                    <td>${escapeHtml(it.stock_item_name || '-')}</td>
                                    <td>${escapeHtml(it.stock_item_unit || '-')}</td>
                                    <td>${it.quantity}</td>
                                    <td>${formatCurrency(it.unit_cost_gbp || 0)}</td>
                                    <td>${formatCurrency(it.line_total_gbp || 0)}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="text-right">
                        <button type="button" class="btn btn-secondary" onclick="hideModal('viewModal')">Close</button>
                    </div>
                `;
                showModal('viewModal');
            } catch (error) {
                showAlert(error.message || 'Failed to load purchase order', 'error');
            }
        }

        async function receivePo(id) {
            try {
                const data = await apiCall(`/purchase-orders/${id}`);
                const order = data.order;
                currentReceiveOrder = order;
                if (!order || !order.items || order.items.length === 0) {
                    showAlert('This purchase order has no line items and cannot be received.', 'error');
                    return;
                }
                document.getElementById('receiveModalTitle').textContent = `Receive ${order.po_number}`;
                document.getElementById('receiveModalContent').innerHTML = `
                    <div style="margin-bottom: 12px;">
                        <strong>Supplier:</strong> ${escapeHtml(order.supplier_name || '-')}<br>
                        <small>Choose Add or Adjust for each line, then submit.</small>
                    </div>
                    <table class="table">
                        <thead><tr><th>Raw Material</th><th>Ordered Qty</th><th>Receive Qty</th><th>Mode</th></tr></thead>
                        <tbody>
                            ${(order.items || []).map((item) => `
                                <tr>
                                    <td>${escapeHtml(item.stock_item_name || '-')}</td>
                                    <td>${item.quantity}</td>
                                    <td>
                                        <input type="number" min="0.01" step="0.01" class="form-input receive-qty"
                                            data-item-id="${item.id}" value="${item.quantity}" style="max-width: 140px;">
                                    </td>
                                    <td>
                                        ${item.is_custom_item
                                            ? `<input type="hidden" class="receive-mode" data-item-id="${item.id}" value="add">
                                               <span class="badge badge-secondary">No stock update</span>`
                                            : `<select class="form-select receive-mode" data-item-id="${item.id}" style="max-width: 220px;">
                                                <option value="add">Add to stock</option>
                                                <option value="adjust">Adjust stock to exact qty</option>
                                            </select>`
                                        }
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="text-right">
                        <button type="button" class="btn btn-secondary" onclick="hideModal('receiveModal')">Cancel</button>
                        <button type="button" class="btn btn-primary" onclick="submitReceive()">Submit Receive</button>
                    </div>
                `;
                showModal('receiveModal');
            } catch (error) {
                showAlert(error.message || 'Failed to load purchase order', 'error');
            }
        }

        async function submitReceive() {
            if (!currentReceiveOrder) return;
            const qtyEls = Array.from(document.querySelectorAll('.receive-qty'));
            const modeEls = Array.from(document.querySelectorAll('.receive-mode'));
            const modeById = new Map(modeEls.map((el) => [String(el.dataset.itemId), el.value]));
            const receivedLines = [];
            for (const qtyEl of qtyEls) {
                const itemId = parseInt(qtyEl.dataset.itemId, 10);
                const quantity = parseFloat(qtyEl.value || 0);
                const mode = String(modeById.get(String(itemId)) || 'add');
                if (!(quantity > 0)) {
                    showAlert('All receive quantities must be greater than zero', 'error');
                    return;
                }
                if (!['add', 'adjust'].includes(mode)) {
                    showAlert('Invalid mode selected for one or more lines', 'error');
                    return;
                }
                receivedLines.push({ item_id: itemId, quantity, mode });
            }
            if (receivedLines.length === 0) {
                showAlert('No receive lines found', 'error');
                return;
            }
            try {
                await apiCall(`/purchase-orders/${currentReceiveOrder.id}/receive`, {
                    method: 'POST',
                    body: JSON.stringify({ received_lines: receivedLines })
                });
                hideModal('receiveModal');
                showAlert('Purchase order received successfully', 'success');
                await loadOrders();
            } catch (error) {
                showAlert(error.message || 'Failed to receive purchase order', 'error');
            }
        }

        async function deletePo(id, poNumber) {
            if (!confirm(`Delete purchase order ${poNumber || `#${id}`}? This cannot be undone.`)) return;
            try {
                await apiCall(`/purchase-orders/${id}`, { method: 'DELETE' });
                showAlert('Purchase order deleted', 'success');
                await loadOrders();
            } catch (error) {
                showAlert(error.message || 'Failed to delete purchase order', 'error');
            }
        }

        document.getElementById('poOrderDate').addEventListener('change', async (e) => {
            const numberData = await apiCall(`/purchase-orders/next-number?order_date=${encodeURIComponent(e.target.value)}`);
            document.getElementById('poNumberPreview').value = numberData.po_number || '';
        });

        document.getElementById('poOneOffPurchase').addEventListener('change', (e) => {
            if (!e.target.checked && lineItems.some((item) => (item.line_type || 'raw_material') === 'custom')) {
                lineItems = lineItems.filter((item) => (item.line_type || 'raw_material') !== 'custom');
                if (lineItems.length === 0) {
                    addLineItem('raw_material');
                    return;
                }
            }
            renderLineItems();
        });

        document.getElementById('poForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payloadItems = lineItems.map((i) => {
                const quantity = parseFloat(i.quantity || 0);
                const unitCost = parseFloat(i.unit_cost_gbp || 0);
                const lineType = i.line_type || (i.custom_item_name ? 'custom' : 'raw_material');
                if (lineType === 'custom') {
                    return {
                        custom_item_name: (i.custom_item_name || '').trim(),
                        custom_unit: (i.custom_unit || 'item').trim() || 'item',
                        quantity,
                        unit_cost_gbp: unitCost
                    };
                }
                return {
                    stock_item_id: parseInt(i.stock_item_id, 10),
                    quantity,
                    unit_cost_gbp: unitCost
                };
            }).filter((i) => {
                if (!(i.quantity > 0)) return false;
                if (i.custom_item_name !== undefined) return !!i.custom_item_name;
                return !Number.isNaN(i.stock_item_id);
            });
            const isOneOffPurchase = document.getElementById('poOneOffPurchase').checked;
            if (!isOneOffPurchase && payloadItems.some((item) => item.custom_item_name)) {
                showAlert('Custom line items are only allowed on one-off purchases', 'error');
                return;
            }
            if (!payloadItems.length && !isOneOffPurchase) {
                showAlert('Add at least one valid line item or mark this as one-off purchase', 'error');
                return;
            }
            const payload = {
                supplier_id: parseInt(document.getElementById('poSupplier').value, 10),
                order_date: document.getElementById('poOrderDate').value,
                expected_date: document.getElementById('poExpectedDate').value || null,
                notes: document.getElementById('poNotes').value.trim() || null,
                is_one_off_purchase: isOneOffPurchase,
                items: payloadItems
            };
            try {
                await apiCall('/purchase-orders', { method: 'POST', body: JSON.stringify(payload) });
                hideModal('poModal');
                showAlert('Purchase order created', 'success');
                await loadOrders();
            } catch (error) {
                showAlert(error.message || 'Failed to create purchase order', 'error');
            }
        });

        init();
    </script>
</body>
</html>
